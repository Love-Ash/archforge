name: Bug report
description: Crash, wrong exit code, broken output contract, or a missed defect (false negative).
title: "[Bug] <one line>"
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Include the full command, stdout/stderr, and the exit code if relevant.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro
      description: A minimal .pptx attachment (zip it if needed) or python-pptx code that builds one.
    validations:
      required: false
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "archforge 0.5.0, Python 3.12, Windows 11"
    validations:
      required: true
