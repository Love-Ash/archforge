name: publish

# PyPI trusted publishing (OIDC): no long-lived token in secrets. One-time setup on
# PyPI is required before this works: pypi.org -> project archforge -> Publishing ->
# add GitHub publisher (owner Love-Ash, repo archforge, workflow publish.yml,
# environment pypi). Until that is configured, releases are uploaded manually with
# twine and this workflow's upload step will fail cleanly.
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build from the release tag
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Tag/version consistency
        run: |
          python - <<'EOF'
          import glob, os, re
          tag = os.environ["TAG"].lstrip("v")
          whl = os.path.basename(glob.glob("dist/*.whl")[0])
          ver = whl.split("-")[1]
          assert ver == tag, "wheel %s does not match tag %s" % (ver, tag)
          print("ok:", whl)
          EOF
        env:
          TAG: ${{ github.event.release.tag_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
