name: publish

# PyPI trusted publishing (OIDC): no long-lived token in secrets. One-time setup on
# PyPI is required: pypi.org -> project archforge -> Publishing -> add a GitHub
# publisher with owner Love-Ash, repo archforge, workflow publish.yml, and the
# Environment name left BLANK (this workflow sends no environment; the OIDC subject is
# repo:Love-Ash/archforge, so the PyPI publisher must not require an environment).
# workflow_dispatch lets a failed publish be retried for an existing tag without cutting
# a new release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g. v0.6.2)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build from the release tag
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Tag/version consistency
        run: |
          python - <<'EOF'
          import glob, os, re
          tag = os.environ["TAG"].lstrip("v")
          whl = os.path.basename(glob.glob("dist/*.whl")[0])
          ver = whl.split("-")[1]
          assert ver == tag, "wheel %s does not match tag %s" % (ver, tag)
          print("ok:", whl)
          EOF
        env:
          TAG: ${{ github.event.inputs.tag || github.event.release.tag_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
